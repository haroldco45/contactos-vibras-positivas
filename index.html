<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos Master - Vibras Positivas</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #c62828; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* Estilos de Control */
        header { text-align: center; padding-bottom: 20px; border-bottom: 2px solid var(--primary); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .search-box { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* Etiquetas de Clasificación */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .badge-mobile { background: #e3f2fd; color: #1565c0; }
        .badge-wa { background: #e8f5e9; color: #2e7d32; }

        /* Lista de Contactos */
        .contact-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .contact-card:hover { background: #f1f8e9; }
        .contact-info { display: flex; flex-direction: column; }
        .contact-name { font-weight: 600; color: #333; }
        .contact-phone { font-size: 0.9em; color: #666; }
        
        .actions { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.85em; font-weight: 600; text-align: center; }
        .btn-call { background: var(--secondary); color: white; }
        .btn-wssp { background: #25d366; color: white; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; font-size: 1.1em; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; text-align: center; }
        .stat-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .stat-num { display: block; font-size: 1.5em; font-weight: bold; color: var(--primary); }

        footer { margin-top: 30px; text-align: center; font-size: 0.8em; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Limpieza y Organización de Contactos</h1>
        <p>Depuración inteligente para tu agenda</p>
    </header>

    <div id="setupArea">
        <div style="padding: 40px; text-align: center;">
            <input type="file" id="vcfInput" accept=".vcf" style="display:none">
            <button class="btn btn-main" onclick="document.getElementById('vcfInput').click()">Subir Contactos_002.vcf para Limpieza</button>
            <p style="color: #666; font-size: 0.9em; margin-top: 10px;">Se eliminarán duplicados y se normalizarán los números automáticamente.</p>
        </div>
    </div>

    <div id="mainApp" style="display:none">
        <div class="stats-grid">
            <div class="stat-item"><span id="statTotal" class="stat-num">0</span>Total Únicos</div>
            <div class="stat-item"><span id="statDupes" class="stat-num" style="color:var(--danger)">0</span>Eliminados</div>
            <div class="stat-item"><span id="statWA" class="stat-num" style="color:#25d366">0</span>WhatsApp</div>
        </div>

        <div class="toolbar">
            <input type="text" id="search" class="search-box" placeholder="Buscar por nombre o empresa..." onkeyup="filter()">
            <button class="btn" style="background:#666; color:white" onclick="resetApp()">Cargar otro archivo</button>
        </div>

        <div id="contactList"></div>
    </div>

    <footer>
        <p>&copy; 2026 Derechos de autor: **Vibras Positivas**</p>
    </footer>
</div>

<script>
    let contacts = [];

    document.getElementById('vcfInput').addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => processVCF(event.target.result);
        reader.readAsText(file);
    }

    function processVCF(text) {
        const rawBlocks = text.split('END:VCARD');
        const uniquePhones = new Set();
        const cleanedData = [];
        let dupeCount = 0;

        rawBlocks.forEach(block => {
            const fnMatch = block.match(/FN:(.*)/);
            const telMatch = block.match(/TEL;[^:]*:(.*)/);
            
            if (fnMatch && telMatch) {
                let name = fnMatch[1].trim();
                let rawPhone = telMatch[1].replace(/[^0-9+]/g, ''); // Solo números y +
                
                // Normalización básica (Ej: quitar prefijo local si es necesario o estandarizar)
                if (uniquePhones.has(rawPhone)) {
                    dupeCount++;
                    return; // Saltar duplicado
                }

                uniquePhones.add(rawPhone);
                cleanedData.push({
                    name: name,
                    phone: rawPhone,
                    type: rawPhone.startsWith('+') ? 'Intl' : (rawPhone.startsWith('3') ? 'Móvil' : 'Fijo')
                });
            }
        });

        // Ordenar alfabéticamente
        contacts = cleanedData.sort((a, b) => a.name.localeCompare(b.name));
        
        // Guardar
        localStorage.setItem('vp_contacts_clean', JSON.stringify(contacts));
        localStorage.setItem('vp_stats_dupes', dupeCount);
        
        display();
    }

    function display() {
        const list = document.getElementById('contactList');
        const setup = document.getElementById('setupArea');
        const main = document.getElementById('mainApp');
        
        setup.style.display = 'none';
        main.style.display = 'block';

        document.getElementById('statTotal').innerText = contacts.length;
        document.getElementById('statDupes').innerText = localStorage.getItem('vp_stats_dupes') || 0;
        document.getElementById('statWA').innerText = contacts.filter(c => c.type !== 'Fijo').length;

        renderItems(contacts);
    }

    function renderItems(data) {
        const list = document.getElementById('contactList');
        list.innerHTML = data.map(c => `
            <div class="contact-card">
                <div class="contact-info">
                    <span class="contact-name">${c.name}</span>
                    <span class="contact-phone">${c.phone} <span class="badge ${c.type === 'Fijo' ? 'badge-mobile' : 'badge-wa'}">${c.type}</span></span>
                </div>
                <div class="actions">
                    <a href="tel:${c.phone}" class="btn btn-call">Llamar</a>
                    <a href="https://wa.me/${c.phone.replace('+', '')}" target="_blank" class="btn btn-wssp">WhatsApp</a>
                </div>
            </div>
        `).join('');
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = contacts.filter(c => c.name.toLowerCase().includes(q));
        renderItems(filtered);
    }

    function resetApp() {
        if(confirm("¿Quieres cargar un nuevo archivo y borrar la limpieza actual?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Auto-cargar si existe
    window.onload = () => {
        const saved = localStorage.getItem('vp_contacts_clean');
        if(saved) {
            contacts = JSON.parse(saved);
            display();
        }
    }
</script>
</body>
</html>
