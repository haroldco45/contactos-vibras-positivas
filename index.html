<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Contactos Pro - Vibras Positivas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid #2e7d32; margin-bottom: 20px; }
        h1 { color: #2e7d32; margin-bottom: 5px; }
        
        .upload-section { background: #e8f5e9; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 2px dashed #4CAF50; }
        .search-box { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .search-box:focus { border-color: #2e7d32; box-shadow: 0 0 5px rgba(46,125,50,0.3); }

        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9em; color: #555; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #2e7d32; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .contact-name { font-weight: bold; color: #333; }
        .actions { display: flex; gap: 10px; }
        
        /* Botones de acción */
        .btn-action { text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 0.85em; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; min-width: 80px; }
        .btn-call { background-color: #1a73e8; color: white; }
        .btn-wssp { background-color: #25d366; color: white; }
        
        .btn-upload { background: #2e7d32; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-upload:hover { background: #1b5e20; }
        .btn-clear { background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        footer { margin-top: 30px; text-align: center; font-size: 0.8em; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gestor de Contactos</h1>
    </header>

    <div id="uploadArea" class="upload-section">
        <p>Carga tu archivo <strong>Contactos_002.vcf</strong> para empezar:</p>
        <input type="file" id="fileInput" accept=".vcf" style="display:none">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Importar Contactos</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Buscar por nombre..." onkeyup="filterContacts()">
    
    <div class="stats-bar">
        <span id="stats">Contactos: 0</span>
        <button id="clearBtn" class="btn-clear" onclick="clearData()" style="display:none">Borrar Todo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="contactTable"></tbody>
    </table>

    <footer>
        <p>&copy; 2026 Derechos de autor: **Vibras Positivas**</p>
    </footer>
</div>

<script>
    let allContacts = [];

    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('vcf_data');
        if (saved) {
            allContacts = JSON.parse(saved);
            render(allContacts);
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'block';
        }
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const vcards = e.target.result.split('END:VCARD');
            allContacts = vcards.map(vcard => {
                const fn = vcard.match(/FN:(.*)/);
                const tel = vcard.match(/TEL;[^:]*:(.*)/);
                return fn ? { name: fn[1].trim(), phone: tel ? tel[1].replace(/\s+/g, '').trim() : null } : null;
            }).filter(c => c && c.name);

            allContacts.sort((a, b) => a.name.localeCompare(b.name));
            localStorage.setItem('vcf_data', JSON.stringify(allContacts));
            render(allContacts);
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'block';
        };
        reader.readAsText(e.target.files[0]);
    });

    function render(data) {
        const table = document.getElementById('contactTable');
        document.getElementById('stats').innerText = `Total: ${data.length} contactos`;
        
        table.innerHTML = data.map(c => {
            const cleanPhone = c.phone ? c.phone.replace(/[^0-9+]/g, '') : '';
            return `
            <tr>
                <td class="contact-name">${c.name}</td>
                <td class="actions">
                    ${c.phone ? `
                        <a href="tel:${cleanPhone}" class="btn-action btn-call">Llamar</a>
                        <a href="https://wa.me/${cleanPhone.replace('+', '')}" target="_blank" class="btn-action btn-wssp">WhatsApp</a>
                    ` : '<span style="color:#ccc">Sin número</span>'}
                </td>
            </tr>`;
        }).join('');
    }

    function filterContacts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allContacts.filter(c => c.name.toLowerCase().includes(query));
        render(filtered);
    }

    function clearData() {
        if(confirm("¿Deseas borrar los contactos guardados?")) {
            localStorage.removeItem('vcf_data');
            location.reload();
        }
    }
</script>

</body>
</html>
